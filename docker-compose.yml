# vers 1.31
services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: edge_vision-backend-${TARGET:-pc}

    ports:
      - "8001:8001"

    volumes:
      - ./backend:/backend

    working_dir: /backend

    env_file:
      - ./.env

    environment:
      TARGET: ${TARGET:-pc}   # default = pc
      PYTHONUNBUFFERED: 1
      YOLO_CONFIG_DIR: /tmp
      ULTRALYTICS_AUTOINSTALL: "false"

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8001
      --reload

    restart: unless-stopped


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: edge_vision-frontend-${TARGET:-pc}

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    working_dir: /app

    env_file:
      - ./.env

    environment:
      VITE_API_URL: http://localhost:8001
      TARGET: ${TARGET:-pc}

    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

    depends_on:
      - backend

    restart: unless-stopped
