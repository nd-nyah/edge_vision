services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: edge_vision-backend-${TARGET:-jetson}

    ports:
      - "8001:8001"

    volumes:
      - ./backend:/backend
      - /tmp/argus_socket:/tmp/argus_socket

    working_dir: /backend

    env_file:
      - ./.env

    environment:
      TARGET: ${TARGET:-jetson}
      PYTHONUNBUFFERED: 1
      YOLO_CONFIG_DIR: /tmp
      ULTRALYTICS_AUTOINSTALL: "false"
      OPENCV_VIDEOIO_PRIORITY_GSTREAMER: 1000

    runtime: nvidia
    privileged: true
    network_mode: host

    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1

      # 🔥 Jetson CSI / Argus devices
      - /dev/nvhost-ctrl:/dev/nvhost-ctrl
      - /dev/nvhost-ctrl-gpu:/dev/nvhost-ctrl-gpu
      - /dev/nvhost-prof-gpu:/dev/nvhost-prof-gpu
      - /dev/nvmap:/dev/nvmap
      - /dev/nvhost-vi:/dev/nvhost-vi
      - /dev/nvhost-vic:/dev/nvhost-vic
      - /dev/nvhost-as-gpu:/dev/nvhost-as-gpu

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8001
      --workers 1

    restart: unless-stopped


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: edge_vision-frontend-${TARGET:-jetson}

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    working_dir: /app

    env_file:
      - ./.env

    environment:
      VITE_API_URL: http://backend:8001
      TARGET: ${TARGET:-jetson}

    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

    depends_on:
      - backend

    restart: unless-stopped


