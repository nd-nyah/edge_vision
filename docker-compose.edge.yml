services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: edge_vision-backend-${TARGET:-jetson}

    ports:
      - "8001:8001"

    volumes:
      - ./backend:/backend
      - /tmp/argus_socket:/tmp/argus_socket   # 🔥 REQUIRED for CSI

    working_dir: /backend

    env_file:
      - ./.env

    environment:
      TARGET: ${TARGET:-jetson}
      PYTHONUNBUFFERED: 1
      YOLO_CONFIG_DIR: /tmp
      ULTRALYTICS_AUTOINSTALL: "false"

    # =========================
    # 🔥 JETSON CAMERA FIX
    # =========================
    runtime: nvidia
    privileged: true
    network_mode: host

    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8001
      --reload

    restart: unless-stopped


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: edge_vision-frontend-${TARGET:-jetson}

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    working_dir: /app

    env_file:
      - ./.env

    environment:
      # IMPORTANT: inside Docker use backend service name or host networking
      VITE_API_URL: http://localhost:8001
      TARGET: ${TARGET:-jetson}

    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

    depends_on:
      - backend

    restart: unless-stopped

